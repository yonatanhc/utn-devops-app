# ─────────────────────────────────────────────────────────────────
# Configuración Nginx para Nail Salon App
#
# Proxy de rutas del backend (las que encontramos en server.js):
#   GET  /turnos
#   POST /turnos
#   DELETE /turnos/:id
#   GET  /horarios-disponibles
#
# Todo lo demás → index.html (React Router)
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy al backend: todas las rutas de la API ──────────────
    # Nginx reenvía estas requests al contenedor "backend"
    # que escucha en el puerto 3001 (nombre del servicio en docker-compose)
    location ~ ^/(turnos|horarios-disponibles) {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Timeout generoso para queries lentas
        proxy_read_timeout 30s;
    }

    # ── Frontend: React Router ───────────────────────────────────
    # Si el archivo no existe (ej: /reservas, /admin)
    # devuelve index.html y React maneja el routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}